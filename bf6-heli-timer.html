<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ace of Spades">
<meta name="theme-color" content="#0a0c0f">
<title>Ace of Spades Heli Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --panel: #090d10;
    --border: #1a2228;
    --friendly: #00ffcc;
    --friendly-dim: rgba(0,255,200,0.14);
    --friendly-glow: rgba(0,255,200,0.6);
    --enemy: #ff3030;
    --enemy-dim: rgba(255,48,48,0.14);
    --enemy-glow: rgba(255,48,48,0.6);
    --overdue: #ffaa00;
    --text-primary: #d4dde6;
    --text-dim: #6a8a9f;
    --accent: #f0c000;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;

    /* All sizing from viewport height so it fills any phone */
    --vh: 1vh;
    --card-h: calc(var(--vh) * 17);
    --timer-fs: calc(var(--vh) * 7.8);
    --label-fs: calc(var(--vh) * 2.9);
    --sub-fs: calc(var(--vh) * 1.55);
    --icon-fs: calc(var(--vh) * 5.2);
    --header-h: calc(var(--vh) * 7);
    --section-label-fs: calc(var(--vh) * 2.4);
    --btn-fs: calc(var(--vh) * 1.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-ui);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--header-h);
    padding: 0 4vw;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-title {
    font-weight: 700;
    font-size: calc(var(--vh) * 2.8);
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    gap: 2vw;
    align-items: center;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    height: calc(var(--vh) * 4.8);
    padding: 0 3.5vw;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1.5vw;
    font-size: var(--btn-fs);
    font-family: var(--font-mono);
    letter-spacing: 0.07em;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .icon-btn:active { border-color: var(--accent); color: var(--accent); }
  .icon-btn.new-game { border-color: rgba(232,48,48,0.35); color: rgba(255,80,80,0.75); }
  .icon-btn.new-game:active { border-color: var(--enemy); color: var(--enemy); }

  /* MAIN */
  .timers-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 3vw;
    overflow: hidden;
    justify-content: space-evenly;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: var(--section-label-fs);
    letter-spacing: 0.22em;
    padding: calc(var(--vh) * 0.8) 1vw calc(var(--vh) * 0.4);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .friendly-label { color: rgba(0,200,160,0.45); }
  .enemy-label    { color: rgba(232,48,48,0.45); }

  .team-section {
    display: flex;
    flex-direction: column;
    gap: calc(var(--vh) * 0.9);
    flex: 1;
    justify-content: center;
  }

  /* TIMER CARD */
  .timer-card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--panel);
    height: var(--card-h);
    display: flex;
    align-items: stretch;
    transition: transform 0.08s;
    flex-shrink: 0;
  }
  .timer-card:active { transform: scale(0.975); }

  /* Left accent stripe */
  .card-stripe {
    width: 5px;
    flex-shrink: 0;
    transition: background 0.3s;
    background: var(--border);
  }
  .friendly .card-stripe { background: rgba(0,255,200,0.35); }
  .enemy    .card-stripe { background: rgba(255,48,48,0.35); }
  .timer-card.active.friendly .card-stripe { background: var(--friendly); }
  .timer-card.active.enemy    .card-stripe { background: var(--enemy); }
  .timer-card.overdue         .card-stripe { background: var(--overdue) !important; }

  /* Border glow */
  .timer-card.active.friendly {
    border-color: rgba(0,255,200,0.75);
    box-shadow: 0 0 30px rgba(0,255,200,0.35), inset 0 0 32px var(--friendly-dim);
  }
  .timer-card.active.enemy {
    border-color: rgba(255,48,48,0.75);
    box-shadow: 0 0 30px rgba(255,48,48,0.35), inset 0 0 32px var(--enemy-dim);
  }
  .timer-card.overdue {
    border-color: rgba(255,149,0,0.65) !important;
    box-shadow: 0 0 22px rgba(255,149,0,0.22), inset 0 0 28px rgba(255,149,0,0.06) !important;
  }

  /* Flash */
  @keyframes flash-f {
    0%,100% { background: var(--panel); }
    20%,60% { background: rgba(0,200,160,0.22); }
    40%,80% { background: var(--panel); }
  }
  @keyframes flash-e {
    0%,100% { background: var(--panel); }
    20%,60% { background: rgba(232,48,48,0.22); }
    40%,80% { background: var(--panel); }
  }
  .timer-card.flash.friendly { animation: flash-f 0.9s ease; }
  .timer-card.flash.enemy    { animation: flash-e 0.9s ease; }

  /* Card inner */
    .card-inner {
    flex: 1;
    display: grid;
    grid-template-columns: calc(var(--card-h) * 0.90) 1fr auto;
    align-items: center;
    padding: 0 3vw 0 2vw;
    column-gap: 2vw;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

    .heli-icon {
    width: calc(var(--card-h) * 0.88);
    height: calc(var(--card-h) * 0.70);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.3s;
    filter: brightness(0.75) grayscale(0) saturate(1.2);
    flex-shrink: 0;
  }
    .heli-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .timer-card.active.friendly .heli-icon { filter: brightness(1.15) saturate(1.3) drop-shadow(0 0 10px rgba(0,255,200,1)); }
  .timer-card.active.enemy .heli-icon { filter: brightness(1.15) saturate(1.3) drop-shadow(0 0 10px rgba(255,48,48,1)); }
  .timer-card.overdue .heli-icon { filter: brightness(1.2) sepia(1) saturate(8) hue-rotate(-15deg); }

    .card-text {
    min-width: 0;
    overflow: hidden;
  }

  .card-label {
    font-weight: 700;
    font-size: var(--label-fs);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.15;
    color: var(--text-dim);
    transition: color 0.3s;
  }
  .timer-card.active.friendly .card-label { color: var(--friendly); }
  .timer-card.active.enemy    .card-label { color: var(--enemy); }
  .timer-card.overdue         .card-label { color: var(--overdue); }

  .card-sublabel {
    font-family: var(--font-mono);
    font-size: var(--sub-fs);
    letter-spacing: 0.1em;
    color: var(--text-dim);
    opacity: 0.55;
    margin-top: calc(var(--vh) * 0.25);
    transition: color 0.3s;
  }
  .timer-card.active.friendly .card-sublabel { color: var(--friendly); }
  .timer-card.active.enemy    .card-sublabel { color: var(--enemy); }
  .timer-card.overdue         .card-sublabel { color: var(--overdue); }

  /* Time + overdue tag */
  .time-block {
    text-align: right;
    flex-shrink: 0;
  }

  .countdown {
    font-family: var(--font-mono);
    font-size: var(--timer-fs);
    letter-spacing: -0.01em;
    color: var(--text-dim);
    line-height: 1;
    transition: color 0.3s;
    display: block;
  }
  .timer-card.active.friendly .countdown { color: var(--friendly); }
  .timer-card.active.enemy    .countdown { color: var(--enemy); }
  .timer-card.overdue         .countdown { color: var(--overdue); }

  .overdue-tag {
    display: none;
    font-family: var(--font-mono);
    font-size: calc(var(--sub-fs) * 0.9);
    color: var(--overdue);
    letter-spacing: 0.1em;
    opacity: 0.8;
    margin-top: calc(var(--vh) * 0.2);
  }
  .timer-card.overdue .overdue-tag { display: block; }

  @keyframes pulse-urgent {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  .countdown.urgent { animation: pulse-urgent 0.42s ease-in-out infinite; }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    transition: width 0.85s linear;
  }
  .friendly .progress-bar { background: linear-gradient(90deg, transparent, var(--friendly)); }
  .enemy    .progress-bar { background: linear-gradient(90deg, transparent, var(--enemy)); }
  .timer-card.overdue .progress-bar { width: 100% !important; background: linear-gradient(90deg, transparent, var(--overdue)); }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
    margin: calc(var(--vh) * 0.4) 2vw;
    flex-shrink: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 300;
  }

  /* SETTINGS */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: all; }

  .settings-panel {
    width: 100%;
    background: #10151c;
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 20px 6vw calc(env(safe-area-inset-bottom, 16px) + 20px);
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  }
  .settings-overlay.open .settings-panel { transform: translateY(0); }

  .settings-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 22px;
  }

  .settings-title {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .settings-row-label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .time-control { display: flex; align-items: center; gap: 5vw; }

  .time-btn {
    background: var(--border);
    border: none;
    color: var(--text-primary);
    width: 46px; height: 46px;
    border-radius: 8px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
  }
  .time-btn:active { background: var(--accent); color: #000; }

  .time-display {
    font-family: var(--font-mono);
    font-size: 32px;
    color: var(--accent);
    min-width: 88px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .settings-close {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .settings-close:active { opacity: 0.8; }
</style>
</head>

          <div class="card-sublabel">ENEMY TEAM</div>
        </div>
        <div class="time-block">
          <span class="countdown" id="time-3">1:20</span>
          <div class="overdue-tag">OVERDUE</div>
        </div>
      </div>
      <div class="progress-bar" id="prog-3"></div>
    </div>
  </div>

</div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsIfBg(event)">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-title">Timer Settings</div>
    <div class="settings-row">
      <div class="settings-row-label">Respawn Duration</div>
      <div class="time-control">
        <button class="time-btn" onclick="adjustTime(-5)">−</button>
        <div class="time-display" id="settingsDisplay">1:20</div>
        <button class="time-btn" onclick="adjustTime(+5)">+</button>
      </div>
    </div>
    <button class="settings-close" onclick="closeSettings()">CONFIRM</button>
  </div>
</div>

<script>
  // Viewport height: fixes iOS Safari 100vh bug
  function setVH() {
    document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', () => setTimeout(setVH, 150));

  const LABELS = [
    "Our team's attack heli",
    "Our team's little bird",
    "Enemy team's attack heli",
    "Enemy team's little bird"
  ];

  let defaultDuration = 80;
  let timers    = [null, null, null, null];
  let remaining = [80, 80, 80, 80];
  let overdue   = [false, false, false, false];
  let wakeLock  = null;

  // Wake lock
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => wakeLock = null);
      }
    } catch(e) {}
  }
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
  });
  requestWakeLock();

  // Speech warm-up (iOS requires a user gesture before TTS)
  document.addEventListener('click', function warmUp() {
    window.speechSynthesis && window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    document.removeEventListener('click', warmUp);
  }, { once: true });

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.92; u.pitch = 0.82; u.volume = 1;
    window.speechSynthesis.speak(u);
  }

  function fmt(s) {
    const neg = s < 0;
    const abs = Math.abs(s);
    const m   = Math.floor(abs / 60);
    const sec = abs % 60;
    return (neg ? '-' : '') + m + ':' + String(sec).padStart(2, '0');
  }

  function toggleTimer(i) {
    if (timers[i] || overdue[i]) {
      // Running or overdue: cancel and reset
      clearInterval(timers[i]);
      timers[i]    = null;
      remaining[i] = defaultDuration;
      overdue[i]   = false;
      updateCard(i, false);
    } else {
      // Start fresh
      remaining[i] = defaultDuration;
      overdue[i]   = false;
      updateCard(i, true);
      timers[i] = setInterval(() => tick(i), 1000);
    }
  }

  function tick(i) {
    remaining[i]--;

    if (remaining[i] === 0) {
      // Announce + flip to overdue — keep interval running into negatives
      overdue[i] = true;
      speak(LABELS[i] + " is ready");
      flashCard(i);
    }

    updateCard(i, true);
  }

  function flashCard(i) {
    const card = document.getElementById('card-' + i);
    card.classList.remove('flash');
    void card.offsetWidth;
    card.classList.add('flash');
    card.addEventListener('animationend', () => card.classList.remove('flash'), { once: true });
  }

  function updateCard(i, active) {
    const card   = document.getElementById('card-' + i);
    const timeEl = document.getElementById('time-' + i);
    const progEl = document.getElementById('prog-' + i);
    const isOver = active && overdue[i];

    card.classList.toggle('active',  active && !isOver);
    card.classList.toggle('overdue', isOver);

    timeEl.textContent = fmt(remaining[i]);
    timeEl.classList.toggle('urgent', active && !isOver && remaining[i] > 0 && remaining[i] <= 10);

    if (!active) {
      progEl.style.width = '0%';
    } else if (isOver) {
      progEl.style.width = '100%';
    } else {
      progEl.style.width = ((defaultDuration - remaining[i]) / defaultDuration * 100) + '%';
    }
  }

  function newGame() {
    for (let i = 0; i < 4; i++) {
      clearInterval(timers[i]);
      timers[i]    = null;
      remaining[i] = defaultDuration;
      overdue[i]   = false;
      updateCard(i, false);
    }
  }

  let settingsDuration = 80;

  function openSettings() {
    settingsDuration = defaultDuration;
    document.getElementById('settingsDisplay').textContent = fmt(settingsDuration);
    document.getElementById('settingsOverlay').classList.add('open');
  }

  function closeSettings() {
    defaultDuration = settingsDuration;
    for (let i = 0; i < 4; i++) {
      if (!timers[i] && !overdue[i]) {
        remaining[i] = defaultDuration;
        updateCard(i, false);
      }
    }
    document.getElementById('settingsOverlay').classList.remove('open');
  }

  function closeSettingsIfBg(e) {
    if (e.target === document.getElementById('settingsOverlay')) closeSettings();
  }

  function adjustTime(delta) {
    settingsDuration = Math.max(5, Math.min(600, settingsDuration + delta));
    document.getElementById('settingsDisplay').textContent = fmt(settingsDuration);
  }

  document.getElementById('settingsBtn').addEventListener('click', openSettings);
</script>
</body>
</html>
